<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Single Page</title>
    <style>
        div {
            display: none;
        }
    </style>

    <script>
        function showPage(page) {
            document.querySelectorAll('div').forEach(div => {
                div.style.display='none';
            })
            document.querySelector(`#${page}`).style.display = 'block';
        }

        function showData(page) {
            let headers = new Headers();

  headers.append('Content-Type', 'application/json');
  headers.append('Accept', 'application/json');

  headers.append('Access-Control-Allow-Origin', 'http://localhost:3000');
  headers.append('Access-Control-Allow-Credentials', 'true');

  headers.append('GET', 'POST', 'OPTIONS');


            fetch('http://localhost:8000/orders/', {method: 'GET',
            headers: headers})
            .then(response => response.json())
            .then(data => {
                const currency = document.querySelector('#currency').value.toUpperCase();
                // console.log(data)
                const error = data.error.info
                document.querySelector('h1').innerHTML = error;   
            })
            .catch(error => {console.log('Error', error)});
    }

        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('button').forEach(button => {
                button.onclick = function () {
                    showData(this.dataset.page)
                }
            })
        });
    </script>
  
</head>
<body>
    <button data-page="page1"> Page1</button>
    <button data-page="page2">Page2</button>
    <button data-page="page3">Page3</button>
<div id="page1">
    <h1>This is page 1</h1> 
</div>
<div id="page2">
    <h1>This is page 2</h1> 
</div>
<div id="page3"> 
<h1>This is page 3</h1> 
<div>

</div>
</body>
</html>
